charts:
  - name: jhe
    # Dev: imagePrefix can be useful to override if you want to trial something
    #      locally developed in a remote k8s cluster.
    imagePrefix: ghcr.io/jupyterhealth/k8s-
    # baseVersion should be managed via tbump
    baseVersion: "0.0.1-0.dev"
    repo:
      git: jupyterhub/helm-chart
      published: https://jupyterhub.github.io/helm-chart
